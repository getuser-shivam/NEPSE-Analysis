# Standalone GitHub Pages deployment — no test dependencies
name: Deploy Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build Flutter Web Dashboard
        run: |
          cd apps/mobile
          flutter pub get
          flutter build web --base-href /NEPSE-Analysis/

      - name: Prepare Artifacts
        run: |
          mkdir -p _site
          cp -r apps/mobile/build/web/* _site/
          cp README.md _site/ 2>/dev/null || true
          cp CHANGELOG.md _site/ 2>/dev/null || true
          touch _site/.nojekyll
          echo "=== Site contents ==="
          ls -la _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
