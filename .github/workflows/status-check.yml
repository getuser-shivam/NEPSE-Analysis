name: Status Check

on:
  schedule:
    - cron: '0 9 * * *'  # Daily at 9 AM UTC
  workflow_dispatch:

jobs:
  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check workflow status
        uses: actions/github-script@v7
        with:
          script: |
            const { data: runs } = await github.rest.actions.listWorkflowRunsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 10,
              status: 'completed'
            });
            
            const failedRuns = runs.workflow_runs.filter(run => run.conclusion === 'failure');
            
            if (failedRuns.length > 0) {
              console.log(`⚠️ Found ${failedRuns.length} failed workflow runs`);
              
              // Create issue if multiple failures
              if (failedRuns.length >= 3) {
                await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: `⚠️ Multiple workflow failures detected (${failedRuns.length})`,
                  body: `Found ${failedRuns.length} failed workflow runs in the last 10 runs.\n\nPlease check the [Actions tab](${context.payload.repository.html_url}/actions) for details.`,
                  labels: ['ci-failure', 'automated']
                });
              }
            } else {
              console.log('✅ All recent workflow runs successful');
            }

      - name: Check dependencies health
        run: |
          echo "Checking for outdated dependencies..."
          cd apps/api && npm outdated || true
          cd ../mobile && dart pub outdated || true

      - name: Notify status
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            // Read CHANGELOG to check last update
            const changelog = fs.readFileSync('CHANGELOG.md', 'utf8');
            const lastUpdate = changelog.match(/##? \[?\d+\.\d+\.\d+\]?.*\n.*?\d{4}-\d{2}-\d{2}/);
            
            console.log('Status check completed');
            console.log('Last version:', lastUpdate ? lastUpdate[0] : 'unknown');
