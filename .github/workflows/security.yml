name: Security Scanning

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  DART_VERSION: '3.2'

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  # ============================================
  # SECRET DETECTION
  # ============================================
  secret-detection:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified

      - name: GitLeaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================
  # SAST - STATIC APPLICATION SECURITY TESTING
  # ============================================
  sast-analysis:
    name: SAST Analysis
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [javascript, python]
        
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{matrix.language}}"

  # ============================================
  # SCA - SOFTWARE COMPOSITION ANALYSIS
  # ============================================
  dependency-scan:
    name: Dependency Scan
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ecosystem: [npm, pub]
        include:
          - ecosystem: npm
            manifest: apps/api/package-lock.json
          - ecosystem: pub
            manifest: apps/mobile/pubspec.lock
            
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/node@master
        if: matrix.ecosystem == 'npm'
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --file=apps/api/package-lock.json

      - name: Upload Snyk results to GitHub Code Scanning
        uses: snyk/actions/node@master
        if: matrix.ecosystem == 'npm'
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: code test
          args: --sarif --sarif-file-output=snyk.sarif

      - name: Upload result to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v4
        if: always() && matrix.ecosystem == 'npm'
        with:
          sarif_file: snyk.sarif

      - name: Dart dependency check
        if: matrix.ecosystem == 'pub'
        run: |
          cd apps/mobile
          dart pub outdated || true

  # ============================================
  # CONTAINER SCANNING
  # ============================================
  container-scan:
    name: Container Security Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t nepse-analysis:scan ./apps/api

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'nepse-analysis:scan'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Scan for CIS Docker benchmarks
        uses: docker/docker-bench-security@master
        if: always()
        continue-on-error: true

  # ============================================
  # INFRASTRUCTURE AS CODE SCAN
  # ============================================
  iac-scan:
    name: IaC Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: all
          output_format: sarif
          output_file_path: reports/checkov.sarif
          quiet: true
          soft_fail: true

      - name: Upload Checkov scan results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: reports/checkov.sarif

  # ============================================
  # DAST - DYNAMIC APPLICATION SECURITY TESTING
  # ============================================
  dast-scan:
    name: DAST Scan
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    needs: [sast-analysis, dependency-scan]
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: ZAP Full Scan
        uses: zaproxy/action-full-scan@v0.9.0
        with:
          target: 'https://getuser-shivam.github.io/NEPSE-Analysis/'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a'
        continue-on-error: true

  # ============================================
  # SECURITY REPORT
  # ============================================
  security-report:
    name: Generate Security Report
    runs-on: ubuntu-latest
    needs: [secret-detection, sast-analysis, dependency-scan, container-scan]
    if: always()
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate summary
        uses: actions/github-script@v7
        with:
          script: |
            const jobs = context.payload.workflow_run?.jobs || [];
            
            const summary = jobs.map(job => {
              const status = job.conclusion === 'success' ? '✅' : '❌';
              return `${status} ${job.name}`;
            }).join('\n');
            
            const body = `## Security Scan Results
            
            ${summary}
            
            **Scan Date:** ${new Date().toISOString()}
            **Commit:** ${context.sha}
            
            View detailed results in the [Security tab](https://github.com/${context.repo.owner}/${context.repo.repo}/security).`;
            
            // Comment on PR if exists
            if (context.issue.number) {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            }

      - name: Upload security artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-scan-results
          path: |
            *.sarif
            reports/
          retention-days: 30
