name: NEPSE Analysis CI/CD

on:
  push:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      deploy_target:
        description: 'Deployment target'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      skip_tests:
        description: 'Skip tests (not recommended)'
        required: false
        default: false
        type: boolean

env:
  NODE_VERSION: '20'
  DART_VERSION: '3.2'
  JAVA_VERSION: '17'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================
  # CHANGELOG & VERSION CHECK
  # ============================================
  changelog:
    name: Check Changelog
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check CHANGELOG.md updated
        if: github.event_name == 'pull_request'
        run: |
          git diff --name-only origin/${{ github.base_ref }} | grep -q "CHANGELOG.md" || {
            echo "⚠️ WARNING: CHANGELOG.md not updated in this PR"
            echo "Please update CHANGELOG.md with your changes"
          }

  # ============================================
  # DART ANALYZE & TEST
  # ============================================
  dart-tests:
    name: Dart Tests
    runs-on: ubuntu-latest
    needs: changelog
    if: ${{ !inputs.skip_tests }}
    defaults:
      run:
        working-directory: ./nepse_analysis
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: ${{ env.DART_VERSION }}

      - name: Cache Dart dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ./nepse_analysis/.dart_tool
          key: ${{ runner.os }}-dart-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-dart-

      - name: Install dependencies
        run: dart pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze project source
        run: dart analyze --fatal-infos --fatal-warnings

      - name: Run unit tests
        run: dart test --reporter=expanded --coverage=coverage

      - name: Generate coverage report
        run: |
          dart pub global activate coverage
          format_coverage --lcov --in=coverage --out=coverage.lcov --packages=.dart_tool/package_config.json --report-on=lib

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./nepse_analysis/coverage.lcov
          flags: dart
          name: dart-coverage
          fail_ci_if_error: false

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dart-test-results
          path: |
            ./nepse_analysis/coverage/
            ./nepse_analysis/test-results.json
          retention-days: 30

  # ============================================
  # NODE.JS BACKEND TESTS
  # ============================================
  node-tests:
    name: Node.js Tests
    runs-on: ubuntu-latest
    needs: changelog
    if: ${{ !inputs.skip_tests }}
    defaults:
      run:
        working-directory: ./backend

    services:
      # SQL Server for integration tests (optional, using service container)
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          SA_PASSWORD: YourStrong@Passw0rd
          MSSQL_PID: Developer
        ports:
          - 1433:1433
        options: >-
          --health-cmd "opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P YourStrong@Passw0rd -Q 'SELECT 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: ./backend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('./backend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: Lint code
        run: npm run check || true

      - name: Run unit tests
        run: npm test --if-present || echo "No tests configured"
        env:
          NODE_ENV: test
          DATABASE_URL: "sqlserver://localhost:1433;database=test;user=sa;password=YourStrong@Passw0rd;trustServerCertificate=true"

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run database migrations (test)
        run: npx prisma migrate deploy || npx prisma db push --accept-data-loss
        env:
          DATABASE_URL: "sqlserver://localhost:1433;database=test;user=sa;password=YourStrong@Passw0rd;trustServerCertificate=true"

      - name: Run integration tests
        run: npm run test:integration --if-present || echo "No integration tests"
        env:
          NODE_ENV: test
          DATABASE_URL: "sqlserver://localhost:1433;database=test;user=sa;password=YourStrong@Passw0rd;trustServerCertificate=true"
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          POLLENS_API_KEY: ${{ secrets.POLLENS_API_KEY }}

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: node-test-results
          path: |
            ./backend/coverage/
            ./backend/test-results/
          retention-days: 30

  # ============================================
  # BUILD DOCUMENTATION & WEB
  # ============================================
  build-web:
    name: Build Web Assets
    runs-on: ubuntu-latest
    needs: [dart-tests, node-tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: ${{ env.DART_VERSION }}
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: ./backend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('./backend/package-lock.json') }}

      - name: Install Node.js dependencies
        working-directory: ./backend
        run: npm ci

      - name: Build Dart documentation
        working-directory: ./nepse_analysis
        run: |
          dart pub get
          dart doc --output ../_site/dart-docs || echo "Dart doc generation skipped"

      - name: Build web dashboard
        working-directory: ./backend
        run: npm run build:web

      - name: Create .nojekyll file
        run: touch _site/.nojekyll

      - name: Copy additional assets
        run: |
          cp README.md _site/ 2>/dev/null || true
          cp CHANGELOG.md _site/ 2>/dev/null || true
          cp GHPAGES_SETUP.md _site/ 2>/dev/null || true

      - name: List build output
        run: |
          echo "=== Build Output ==="
          ls -la _site/
          echo "=== File Count ==="
          find _site -type f | wc -l

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: _site/
          retention-days: 5

  # ============================================
  # DEPLOY TO GITHUB PAGES
  # ============================================
  deploy-github-pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build-web
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: https://getuser-shivam.github.io/NEPSE-Analysis/
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: _site/

      - name: Verify build output
        run: |
          echo "=== Verifying Build Output ==="
          ls -la _site/
          if [ ! -f "_site/index.html" ]; then
            echo "❌ ERROR: index.html not found!"
            exit 1
          fi
          echo "✅ Build output verified"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
          commit_message: "Deploy to GitHub Pages: ${{ github.event.head_commit.message }}"
          cname: ""  # Leave empty for default github.io domain, or set custom domain

      - name: Verify deployment
        run: |
          echo "✅ Deployed to https://getuser-shivam.github.io/NEPSE-Analysis/"
          echo "⏳ Note: Changes may take a few minutes to propagate"

      - name: Create deployment notification
        uses: actions/github-script@v7
        if: success()
        with:
          script: |
            const url = 'https://getuser-shivam.github.io/NEPSE-Analysis/';
            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: `🚀 Successfully deployed to GitHub Pages!\n\n🔗 View at: ${url}\n\n⏳ Note: Changes may take 2-5 minutes to propagate across CDN.`
            });

  # ============================================
  # RELEASE & TAGGING
  # ============================================
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [dart-tests, node-tests]
    if: github.ref == 'refs/heads/main' && contains(github.event.head_commit.message, '[release]')
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from CHANGELOG
        id: get_version
        run: |
          VERSION=$(grep -oP '^##?\s*\[?\K[0-9]+\.[0-9]+\.[0-9]+' CHANGELOG.md | head -1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Create Git tag
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git tag -a "v${{ steps.get_version.outputs.version }}" -m "Release v${{ steps.get_version.outputs.version }}"
          git push origin "v${{ steps.get_version.outputs.version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          name: Release v${{ steps.get_version.outputs.version }}
          body_path: CHANGELOG.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================
  # SECURITY SCAN
  # ============================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: changelog
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner (Node.js)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: './backend'
          format: 'sarif'
          output: 'trivy-node-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-node-results.sarif'

      - name: Run npm audit
        working-directory: ./backend
        run: npm audit --audit-level=high || true

  # ============================================
  # NOTIFICATIONS
  # ============================================
  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    needs: [dart-tests, node-tests, deploy-github-pages]
    if: always() && github.ref == 'refs/heads/main'
    
    steps:
      - name: Notify on success
        if: needs.dart-tests.result == 'success' && needs.node-tests.result == 'success'
        run: |
          echo "✅ All tests passed! Build successful."
          echo "Dart tests: ${{ needs.dart-tests.result }}"
          echo "Node tests: ${{ needs.node-tests.result }}"
          echo "GitHub Pages deploy: ${{ needs.deploy-github-pages.result }}"

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `❌ Build failed: ${context.sha.substring(0, 7)}`,
              body: `Build failed for commit ${context.sha}.\n\nCheck the [Actions tab](${context.payload.repository.html_url}/actions) for details.`,
              labels: ['bug', 'ci-failure']
            });
            console.log(`Created issue #${issue.data.number}`);
