name: Pull Request Checks

on:
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened]

env:
  NODE_VERSION: '20'
  DART_VERSION: '3.2'

jobs:
  # ============================================
  # PR METADATA CHECK
  # ============================================
  pr-check:
    name: PR Check
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          requireScope: false

  # ============================================
  # DART PR CHECKS
  # ============================================
  dart-pr:
    name: Dart PR Checks
    runs-on: ubuntu-latest
    needs: pr-check
    defaults:
      run:
        working-directory: ./apps/mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: ${{ env.DART_VERSION }}

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ./apps/mobile/.dart_tool
          key: ${{ runner.os }}-dart-${{ hashFiles('**/pubspec.lock') }}

      - name: Install dependencies
        run: dart pub get

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        run: dart analyze --fatal-infos

      - name: Run tests
        run: dart test --reporter=compact

      - name: Comment test results
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const outcome = '${{ job.status }}';
            const message = outcome === 'success' 
              ? '✅ Dart tests passed!'
              : '❌ Dart tests failed. Please check the logs.';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message
            });

  # ============================================
  # NODE.JS PR CHECKS
  # ============================================
  node-pr:
    name: Node.js PR Checks
    runs-on: ubuntu-latest
    needs: pr-check
    defaults:
      run:
        working-directory: ./apps/api

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: './apps/api/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run check || true

      - name: Run tests
        run: npm test --if-present || echo "No tests configured"

      - name: Check Prisma schema
        run: npx prisma validate

      - name: Comment results
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const outcome = '${{ job.status }}';
            const message = outcome === 'success' 
              ? '✅ Node.js checks passed!'
              : '❌ Node.js checks failed. Please review.';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message
            });

  # ============================================
  # SIZE CHECK
  # ============================================
  size-check:
    name: Size Check
    runs-on: ubuntu-latest
    needs: [dart-pr, node-pr]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check bundle size (Node.js)
        working-directory: ./apps/api
        run: |
          npm ci
          npm run build --if-present || echo "No build step"
          du -sh . 2>/dev/null || echo "Size check skipped"

      - name: Post size comment
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '📦 Bundle size check complete.'
            });
