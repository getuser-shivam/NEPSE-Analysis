<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NEPSE Dashboard | Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
</head>
<body>
  <div id="app">
    <aside class="sidebar">
      <h2>NEPSE Hub</h2>
      <nav>
        <div class="nav-item active">Market Dashboard</div>
        <div class="nav-item">Portfolio Profile</div>
        <div class="nav-item">Watchlist</div>
        <div class="nav-item">Settings</div>
      </nav>
      <div class="sidebar-footer">
        <button id="auth-btn" class="glass-btn primary-glow">Sign In</button>
      </div>
    </aside>

    <main class="main-content">
      <header class="glass-card market-hero">
        <div>
          <span class="status-positive">NEPSE Index</span>
          <div class="index-value">2,145.67</div>
          <div class="status-positive">+26.43 (1.24%)</div>
        </div>
        <div>
          <span>Market Volume</span>
          <div class="index-value">NPR 4.2B</div>
          <div class="status-positive">Active</div>
        </div>
      </header>

      <section class="glass-card">
        <h3>Top Gainers</h3>
        <table id="gainers-table">
          <thead>
            <tr>
              <th>Symbol</th>
              <th>LTP</th>
              <th>Change</th>
              <th>% Change</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>NABIL</td>
              <td>545.20</td>
              <td class="status-positive">+12.4</td>
              <td class="status-positive">2.33%</td>
            </tr>
          </tbody>
        </table>
      </section>

      <section class="glass-card chart-container">
        <div class="chart-header">
          <h3>Market Action</h3>
          <div class="chart-controls">
            <button class="indicator-toggle" data-indicator="sma">SMA</button>
            <button class="indicator-toggle" data-indicator="rsi">RSI</button>
            <button class="indicator-toggle" data-indicator="macd">MACD</button>
          </div>
        </div>
        <div id="chart"></div>
      </section>
    </main>
  </div>

  <!-- Auth Modal Overlay -->
  <div id="auth-modal" class="modal-overlay hidden">
    <div class="glass-modal auth-container">
      <button class="close-btn" id="close-auth">&times;</button>
      <h2>Secure Access</h2>
      <p>Sign in to NEPSE Hub to access your personalized portfolio.</p>
      
      <form id="auth-form">
        <div class="input-group">
          <label>Phone / Email</label>
          <input type="text" placeholder="Enter credentials..." required />
        </div>
        <div class="input-group">
          <label>Password</label>
          <input type="password" placeholder="••••••••" required />
        </div>
        <button type="submit" class="glass-btn primary-glow submit-auth">Authenticate</button>
      </form>
    </div>
  </div>
  <!-- Fallback Demo Script (Bypassing Dart Compilation for Instant UI Review) -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      // Auth Modal Logic
      const modal = document.getElementById('auth-modal');
      const authBtn = document.getElementById('auth-btn');
      const closeBtn = document.getElementById('close-auth');
      const authForm = document.getElementById('auth-form');

      authBtn.addEventListener('click', () => modal.classList.remove('hidden'));
      closeBtn.addEventListener('click', () => modal.classList.add('hidden'));

      authForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const submitBtn = authForm.querySelector('.submit-auth');
        const origText = submitBtn.textContent;
        submitBtn.textContent = 'Authenticating...';
        
        setTimeout(() => {
          modal.classList.add('hidden');
          authBtn.textContent = 'User Dashboard';
          authBtn.classList.remove('primary-glow');
          authBtn.style.color = 'var(--positive)';
          submitBtn.textContent = origText;
        }, 1500);
      });

      // Chart Logic (Mock)
      const options = {
        chart: { type: 'area', height: 350, toolbar: { show: false }, fontFamily: 'Inter, sans-serif' },
        theme: { mode: 'dark' },
        colors: ['#00f2fe', '#9b51e0'],
        stroke: { curve: 'smooth', width: [3, 2] },
        dataLabels: { enabled: false },
        series: [{ name: 'NEPSE Index', data: [2040, 2055, 2080, 2100, 2095, 2145, 2160, 2150, 2180, 2220] }],
        xaxis: { categories: ['1st', '2nd', '3rd', '4rd', '5th', '6th', '7th', '8th', '9th', '10th'], tooltip: {enabled: false} },
        yaxis: [{ title: { text: 'Price (NPR)' }}],
        fill: { type: ['gradient', 'solid'], gradient: { shadeIntensity: 1, opacityFrom: 0.7, opacityTo: 0.1 } },
        legend: { position: 'top', horizontalAlign: 'right' }
      };

      let chart = new ApexCharts(document.querySelector("#chart"), options);
      chart.render();

      // Indicator toggles
      document.querySelectorAll('.indicator-toggle').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const target = e.target;
          target.classList.toggle('active');
          
          if(target.dataset.indicator === 'sma' && target.classList.contains('active')) {
             chart.appendSeries({ name: 'SMA (5)', type: 'line', data: [2050, 2060, 2075, 2090, 2105, 2130, 2140, 2145, 2170, 2190] });
          } else if (target.dataset.indicator === 'sma') {
             // Basic implementation to toggle off (in real app, use IDs)
             chart.updateSeries([{ name: 'NEPSE Index', data: [2040, 2055, 2080, 2100, 2095, 2145, 2160, 2150, 2180, 2220] }]);
          }
        });
      });
    });
  </script>
</body>
</html>
